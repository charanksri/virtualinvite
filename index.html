<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Invitation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="header-image">🌹</div>
        <h1 class="title">Will you be my date?</h1>
        <p class="subtitle">I’d love to spend an evening with you, filled with good food and even better conversation.</p>
        
        <div class="actions">
            <button id="yesBtn" class="btn btn-yes">Yes, I'd love to!</button>
            <button id="noBtn" class="btn btn-no">No</button>
        </div>
        
        <div id="response" class="hidden">
            <h2 class="success-msg">It's a date! ❤️</h2>
            <p>I'll send you the details soon.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
